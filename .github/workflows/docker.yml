name: FedOmics Docker CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fedomics:ci .

      - name: Run smoke test inside container
        run: |
          docker run --rm \
            -e FEDOMICS_CONFIG=configs/config.ci.yaml \
            -e FEDOMICS_MLFLOW_TRACKING_URI=sqlite:///mlflow.db \
            fedomics:ci \
            python -m scripts.run_pipeline --clean --mode sim --sim-signal-mode linear